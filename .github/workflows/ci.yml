name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: MCP smoke test
        run: npm run validate:mcp

      - name: Validate Skills CLI discovery
        run: npx --cache .npm-skills-cache --yes skills add . --list

      - name: Validate npm package contents
        run: npm run validate:pack
